<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Table of 8 - Assessment</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #000080;
            font-size: 36px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #fff3e6;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        td {
            padding: 15px;
            border: 1px solid #ccc;
            font-size: 20px;
            font-weight: bold;
        }
        input {
            width: 80px;
            padding: 8px;
            text-align: center;
            font-size: 20px;
            border: 1px solid #ccc;
            margin: 10px;
            background-color: #ffffe6;
        }
        input.correct { background-color: #d4edda; }
        input.incorrect { background-color: #f8d7da; }

        button {
            padding: 12px 25px;
            background-color: #ff6347;
            color: white;
            border: 2px solid #ff4500;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #ff4500;
        }
        .result {
            margin-top: 30px;
            font-size: 22px;
        }
        .correct-answer {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Multiplication Table of 8</h1>
<p>Fill in the correct answers (questions are randomized):</p>

<table id="quizTable"></table>

<button onclick="checkAnswers()">Submit</button>

<div class="result" id="result"></div>

<script>
    const questions = [
        { q: "8 × 1", a: 8 },
        { q: "8 × 2", a: 16 },
        { q: "8 × 3", a: 24 },
        { q: "8 × 4", a: 32 },
        { q: "8 × 5", a: 40 },
        { q: "8 × 6", a: 48 },
        { q: "8 × 7", a: 56 },
        { q: "8 × 8", a: 64 },
        { q: "8 × 9", a: 72 },
        { q: "8 × 10", a: 80 }
    ];

    // Shuffle questions
    questions.sort(() => Math.random() - 0.5);

    // Build table
    const table = document.getElementById("quizTable");
    for (let i = 0; i < questions.length; i += 2) {
        const row = document.createElement("tr");

        for (let j = i; j < i + 2 && j < questions.length; j++) {
            row.innerHTML += `
                <td>${questions[j].q}</td>
                <td><input type="text" data-answer="${questions[j].a}"></td>
            `;
        }
        table.appendChild(row);
    }

    function checkAnswers() {
        const inputs = document.querySelectorAll("input");
        let score = 0;
        let resultHtml = "";

        inputs.forEach((input, index) => {
            const correct = input.dataset.answer;
            input.classList.remove("correct", "incorrect");

            if (input.value == correct) {
                score++;
                input.classList.add("correct");
                resultHtml += `<p>${questions[index].q} = <span class="correct-answer">${correct}</span> — Correct!</p>`;
            } else {
                input.classList.add("incorrect");
                resultHtml += `<p>${questions[index].q} = <span class="correct-answer">${correct}</span> — Incorrect (you wrote ${input.value})</p>`;
            }
        });

        const percentage = (score / inputs.length) * 100;
        resultHtml += `<p><strong>Your score:</strong> ${score} / ${inputs.length} (${percentage}%)</p>`;
        document.getElementById("result").innerHTML = resultHtml;
    }
</script>

</body>
</html>
